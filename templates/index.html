{% extends 'base.html' %}{% block content %}
<section class="card form-card"><h1>Document Upload करा</h1><p class="muted">QR Scan करून Customer इथून order देईल</p><form action="/submit" method="post" enctype="multipart/form-data" id="orderForm"><label>नाव</label><input name="name" required><label>मोबाइल नंबर</label><input name="mobile" required><label>Service</label><select name="service" id="service">{% for k,s in services.items() %}<option value="{{k}}" data-rate="{{s.rate}}" data-printer="{{s.printer}}">{{s.name}} - ₹{{s.rate}} / page</option>{% endfor %}</select><div class="grid2"><div><label>Approx/Total Pages</label><input type="number" name="pages" id="pages" value="1" min="1"><small>PDF upload केल्यावर server खरे pages मोजेल.</small></div><div><label>Copies</label><input type="number" name="copies" id="copies" value="1" min="1"></div></div><label>Payment</label><select name="payment"><option>Pay at Shop</option><option>Pay Now UPI</option><option>Cash</option></select><label>Notes</label><textarea name="notes" placeholder="उदा. page 1 color, बाकी B/W"></textarea><label>Documents Upload</label><div class="drop"><input type="file" name="documents" multiple required accept=".pdf,.jpg,.jpeg,.png,.doc,.docx"><p>Multiple files select करू शकता</p></div><div class="total"><b>Total अंदाजे: ₹<span id="total">5</span></b><br><small>Suggested Printer: <span id="printer"></span></small></div><button>Submit Order</button></form></section><script src="{{ url_for('static', filename='js/app.js') }}"></script>
{% endblock %}
