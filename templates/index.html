<!DOCTYPE html><html lang="mr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>{{app_name}}</title><link rel="stylesheet" href="/static/style.css"></head><body><div class="wrap"><div class="card"><h1>Akash Digital PrintHub</h1><p class="sub">Document Upload करा आणि Print Order द्या</p><form action="/submit" method="post" enctype="multipart/form-data"><label>नाव</label><input name="name" required><label>मोबाइल नंबर</label><input name="mobile" required><label>Service</label><select name="service" id="service" onchange="calc()">{% for key, r in rates.items() %}<option value="{{key}}" data-rate="{{r.rate}}">{{r.label}} - ₹{{r.rate}}</option>{% endfor %}</select><label>Approx Pages</label><input type="number" id="pages" value="1" min="1" oninput="calc()"><small>PDF upload केल्यावर server actual pages मोजेल.</small><label>Copies</label><input name="copies" id="copies" type="number" value="1" min="1" oninput="calc()"><label>Payment</label><select name="payment_mode"><option>Pay at Shop</option><option>Pay Now UPI</option><option>Cash</option></select><label>Notes</label><textarea name="notes" placeholder="उदा. page 1 color, बाकी B/W"></textarea><label>Document Upload</label><input type="file" name="documents" multiple required><div class="total">Total अंदाजे: ₹<span id="total">5</span></div><button>Submit Order</button></form><a href="/admin">Admin Panel</a></div></div><script>function calc(){let s=document.getElementById('service');let rate=parseInt(s.options[s.selectedIndex].dataset.rate);let pages=parseInt(document.getElementById('pages').value||1);let copies=parseInt(document.getElementById('copies').value||1);let isId=s.value==='id_card';document.getElementById('total').innerText=(isId?rate*copies:rate*pages*copies);}calc();</script></body></html>
